name: Microservices build

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
    paths:
      - "backend/workers/scanalyze-ingest-api/**"
      - "backend/workers/scanalyze-ocr-worker/**"
      - "backend/workers/scanalyze-postprocess-worker/**"
      - "backend/workers/scanalyze-classifier-worker/**"
      - "backend/workers/scanalyze-bank-worker/**"
      - "backend/workers/scanalyze-personal-worker/**"
      - "backend/workers/scanalyze-gov-worker/**"
      - "scripts/microservices/**"
      - "tests/test_microservices/**"
      - "tooling/check_microservices.py"
      - "pyproject.toml"
      - ".github/workflows/microservices-build.yml"
  workflow_dispatch:
    inputs:
      customer_id:
        description: Protected GitHub Environment for the customer deployment
        required: true
        type: environment
      service:
        description: Service selection
        required: true
        default: all
        type: choice
        options:
          - all
          - ingest-api
          - ocr-worker
          - postprocess-worker
          - classifier-worker
          - bank-worker
          - personal-worker
          - gov-worker
      deployment_id:
        description: Deployment ID (must match the selected environment)
        required: true
        type: string
      aws_account_id:
        description: AWS account ID (must match the selected environment)
        required: true
        type: string
      aws_region:
        description: AWS region (must match the selected environment)
        required: true
        type: string
      ecr_prefix:
        description: Full ECR namespace, for example dep-.../scanalyze
        required: true
        type: string
      tag:
        description: Immutable tag; empty uses sha-<commit>
        required: false
        default: ""
        type: string
      push_images:
        description: Push images after validation
        required: true
        default: false
        type: boolean
      write_ssm:
        description: Write image tag and digest metadata after push
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  changes:
    name: Select services
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      services: ${{ steps.select.outputs.services }}
      publish_services: ${{ steps.select.outputs.publish_services }}
      has_changes: ${{ steps.select.outputs.has_changes }}
      publishable: ${{ steps.select.outputs.publishable }}
    steps:
      - name: Validate dispatch safety
        if: github.event_name == 'workflow_dispatch'
        env:
          CURRENT_REF: ${{ github.ref }}
          PUSH_IMAGES: ${{ inputs.push_images }}
          WRITE_SSM: ${{ inputs.write_ssm }}
        run: |
          set -euo pipefail
          if [[ "$WRITE_SSM" == "true" && "$PUSH_IMAGES" != "true" ]]; then
            echo "::error::write_ssm requires push_images"
            exit 1
          fi
          if [[ "$PUSH_IMAGES" == "true" && "$CURRENT_REF" != "refs/heads/main" ]]; then
            echo "::error::Publishing is restricted to refs/heads/main"
            exit 1
          fi

      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve service matrix
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SERVICE: ${{ inputs.service }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          publishable=false
          publish_services='[]'

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            services="$(scripts/microservices/changed-services.sh --all)"
            if [[ "$DISPATCH_SERVICE" == "all" ]]; then
              publish_services="$services"
            else
              publish_services="$(scripts/microservices/changed-services.sh --service "$DISPATCH_SERVICE")"
            fi
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            services="$(scripts/microservices/changed-services.sh --diff "$PR_BASE_SHA" "$PR_HEAD_SHA")"
          else
            base_sha="$PUSH_BASE_SHA"
            if [[ "$base_sha" =~ ^0+$ ]]; then
              services="$(scripts/microservices/changed-services.sh --all)"
              publish_services="$services"
              publishable=true
            else
              services="$(scripts/microservices/changed-services.sh --diff "$base_sha" "$PUSH_HEAD_SHA")"
              publish_services="$(scripts/microservices/changed-services.sh --service-diff "$base_sha" "$PUSH_HEAD_SHA")"
              if [[ "$publish_services" != "[]" ]]; then
                publishable=true
              fi
            fi
          fi

          printf 'services=%s\n' "$services" >> "$GITHUB_OUTPUT"
          printf 'publish_services=%s\n' "$publish_services" >> "$GITHUB_OUTPUT"
          printf 'publishable=%s\n' "$publishable" >> "$GITHUB_OUTPUT"
          if [[ "$services" == "[]" ]]; then
            printf 'has_changes=false\n' >> "$GITHUB_OUTPUT"
          else
            printf 'has_changes=true\n' >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Service matrix evidence / ${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11.14"
          cache: pip
          cache-dependency-path: backend/workers/scanalyze-${{ matrix.service }}/requirements.txt

      - name: Validate repository policy
        run: python tooling/check_microservices.py

      - name: Compile and test service
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
          AWS_REGION: us-east-1
          SCANALYZE_ENV: ci
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          service_dir="backend/workers/scanalyze-${SERVICE}"
          case "$SERVICE" in
            bank-worker) service_tenant="bank" ;;
            personal-worker) service_tenant="personal" ;;
            gov-worker) service_tenant="gov" ;;
            *) service_tenant="platform" ;;
          esac
          export SCANALYZE_TENANT="$service_tenant"
          export SCANALYZE_TENANTS="$service_tenant"
          python -m compileall -q "$service_dir"
          python -m pip install \
            -r "$service_dir/requirements.txt" \
            'jsonschema==4.26.0' \
            'pytest==9.1.1'
          PYTHONPATH="$service_dir/src:$service_dir" python -m pytest "$service_dir/tests" -q

      - name: Build without publishing
        env:
          CI_BASE_IMAGE: ${{ vars.CI_BASE_IMAGE }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          if [[ -z "$CI_BASE_IMAGE" ]]; then
            echo "::notice::Skipping Docker build: repository variable CI_BASE_IMAGE is not configured"
            echo "Code validation was performed by the compile-and-test step above"
            exit 0
          fi
          scripts/microservices/build-push.sh \
            --service "$SERVICE" \
            --tag "sha-${GITHUB_SHA:0:12}" \
            --base-image "$CI_BASE_IMAGE" \
            --no-push \
            --no-write-ssm

  tooling:
    name: Validate build tooling
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Run build-tool tests
        run: |
          set -euo pipefail
          python -m pip install '.[test]'
          python -m pytest tests/test_microservices -q

  validation_gate:
    name: Microservices validation gate
    needs:
      - changes
      - tooling
      - validate
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Enforce aggregate validation result
        env:
          SELECTION_RESULT: ${{ needs.changes.result }}
          SERVICES_JSON: ${{ needs.changes.outputs.services }}
          HAS_CHANGES: ${{ needs.changes.outputs.has_changes }}
          TOOLING_RESULT: ${{ needs.tooling.result }}
          VALIDATION_RESULT: ${{ needs.validate.result }}
        run: |
          set -euo pipefail

          summary_file="${GITHUB_STEP_SUMMARY:-/dev/null}"
          {
            printf '### Microservices validation gate\n\n'
            printf -- '- Service selection: `%s`\n' "$SELECTION_RESULT"
            printf -- '- Selected services: `%s`\n' "$SERVICES_JSON"
            printf -- '- Has service changes: `%s`\n' "$HAS_CHANGES"
            printf -- '- Build tooling: `%s`\n' "$TOOLING_RESULT"
            printf -- '- Service matrix: `%s`\n' "$VALIDATION_RESULT"
          } >> "$summary_file"

          fail() {
            printf '::error::%s\n' "$1"
            exit 1
          }

          [[ "$SELECTION_RESULT" == "success" ]] ||
            fail "service selection did not succeed: $SELECTION_RESULT"
          [[ "$TOOLING_RESULT" == "success" ]] ||
            fail "build tooling validation did not succeed: $TOOLING_RESULT"

          case "$HAS_CHANGES" in
            true)
              [[ -n "$SERVICES_JSON" && "$SERVICES_JSON" != "[]" ]] ||
                fail "has_changes=true requires a non-empty service matrix"
              [[ "$VALIDATION_RESULT" == "success" ]] ||
                fail "selected service validation did not succeed: $VALIDATION_RESULT"
              ;;
            false)
              [[ "$SERVICES_JSON" == "[]" ]] ||
                fail "has_changes=false requires an empty service matrix"
              [[ "$VALIDATION_RESULT" == "skipped" ]] ||
                fail "an empty service matrix must be skipped, got: $VALIDATION_RESULT"
              ;;
            *)
              fail "service selection produced an invalid has_changes value"
              ;;
          esac

  publish:
    name: Publication NO-GO / ${{ matrix.service }}
    needs:
      - changes
      - validation_gate
    if: >-
      needs.changes.result == 'success' &&
      needs.validation_gate.result == 'success' &&
      needs.changes.outputs.has_changes == 'true' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.push_images && github.ref == 'refs/heads/main') ||
        (github.event_name == 'push' && needs.changes.outputs.publishable == 'true' && vars.MAIN_PUBLISH_ENABLED == 'true')
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.publish_services) }}
    steps:
      - name: Deny legacy publishing until the authorized release engine exists
        run: |
          set -euo pipefail
          echo "::error::Cloud publication is disabled until GUG-124 and GUG-125 connect the GUG-123 authorization chain."
          exit 1
