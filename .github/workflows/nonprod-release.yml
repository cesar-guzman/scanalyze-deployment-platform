name: Non-production release

on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: "Path to deployment manifest (outside repo, uploaded via artifact)"
        required: true
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - sandbox
          - dev
          - staging

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Pre-release validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install '.[test]'

      - name: Repro check
        run: make repro-check

      - name: Validate manifest
        run: python scripts/deployment/validate-manifest.py "${{ inputs.manifest_path }}"

  go-no-go:
    name: GO/NO-GO gate
    needs: validate
    runs-on: ubuntu-24.04
    environment: "${{ inputs.environment }}"
    steps:
      - name: GO/NO-GO
        run: echo "✅ GO/NO-GO gate approved for ${{ inputs.environment }}"

  publish:
    name: Build and publish images
    needs: go-no-go
    runs-on: ubuntu-24.04
    environment: "${{ inputs.environment }}"
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Build, scan, sign, and push
        env:
          SCANALYZE_ALLOW_LIVE: "1"
        run: |
          echo "🚧 Non-production release pipeline"
          echo "This step requires the orchestrator to be connected to the manifest."
          echo "Implementation depends on live AWS access authorization."
          echo "BLOCKED: Awaiting live AWS authorization from deployment owner."
