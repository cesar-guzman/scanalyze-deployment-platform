name: PR validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-security:
    name: Lint, security, and schema checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install '.[test]'

      - name: Security sentinel
        run: make security-check

      - name: Git safety
        run: make git-safety

      - name: JSON and schema validation
        run: |
          make json-syntax-check
          make schema-check

      - name: Microservices structure check
        run: make microservices-check

      - name: Terraform format check
        run: make terraform-fmt-check

      - name: Docs check
        run: make docs-check

  python-tests:
    name: Python tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install '.[test]'

      - name: Run all tests
        run: python -m pytest tests/ -v --tb=short

      - name: Compile check
        run: python -m compileall backend/workers -q

  manifest-validation:
    name: Validate deployment manifest schema
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11.14"

      - name: Install dependencies
        run: python -m pip install pyyaml jsonschema

      - name: Validate synthetic manifest
        run: python scripts/deployment/validate-manifest.py examples/deployments/synthetic-nonprod.yaml

  terraform-validate:
    name: Terraform validate (no AWS)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.12.1"

      - name: Validate all roots (no backend)
        env:
          AWS_EC2_METADATA_DISABLED: "true"
        run: make provider-check
