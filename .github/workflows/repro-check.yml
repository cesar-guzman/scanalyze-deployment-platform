name: Reproducibility check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clean-clone-check:
    name: Verify clean clone reproducibility
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.14.6"

      - name: Install dependencies
        run: python -m pip install '.[test]'

      - name: Bootstrap local
        run: make bootstrap-local

      - name: Repro check
        run: make repro-check

      - name: Release dry-run
        run: make release-dry-run

      - name: Report success
        if: success()
        run: echo "✅ Clean clone reproducibility check PASSED"

      - name: Report failure
        if: failure()
        run: echo "❌ Clean clone reproducibility check FAILED"
