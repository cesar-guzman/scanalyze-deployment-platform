          REPAIR_NOT_AFTER: !Ref RepairNotAfter
          PLAN_FUNCTION_VERSION: !GetAtt PlanFunctionVersion.Version
          COLLECTOR_SAML_PROVIDER_ARN: !Ref CollectorSamlProviderArn
          IDENTITY_CENTER_KMS_MODE: !Ref IdentityCenterKmsMode
          IDENTITY_CENTER_KMS_KEY_ARN: !Ref IdentityCenterKmsKeyArn
          EXPECTED_BOTO3_VERSION: !Ref ExpectedBoto3Version
          EXPECTED_BOTOCORE_VERSION: !Ref ExpectedBotocoreVersion
      Tags:
        - {Key: managed_by, Value: cloudformation}
        - {Key: service, Value: scanalyze-platform-authority}
        - {Key: source_commit, Value: !Ref SourceCommit}
        - {Key: work_package, Value: GUG-221}
        - {Key: environment, Value: non-production}
        - {Key: production, Value: 'false'}

  RepairFunctionVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName: !Ref RepairFunction
      CodeSha256: !Ref RepairArtifactCodeSha256
      Description: GUG-221 reviewed immutable repair version

  RepairAlias:
    Type: AWS::Lambda::Alias
    Properties:
      FunctionName: !Ref RepairFunction
      FunctionVersion: !GetAtt RepairFunctionVersion.Version
      Name: repair-v1

  RepairEventInvokeConfig:
    Type: AWS::Lambda::EventInvokeConfig
    DependsOn: RepairAlias
    Properties:
      FunctionName: !Ref RepairFunction
      Qualifier: repair-v1
      MaximumEventAgeInSeconds: 60
      MaximumRetryAttempts: 0

  ReconcileFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - RepairLedger
      - ReconcileLogGroup
    Properties:
      FunctionName: scanalyze-authority-lambda-audit-reconcile
      Description: GUG-221 read-only reconciliation PEP
      Runtime: python3.12
      Handler: tooling.platform_authority_lambda_audit_repair_broker_runtime.reconcile_handler
      Architectures: [x86_64]
      MemorySize: 1024
      Timeout: 300
      ReservedConcurrentExecutions: 1
      Role: !GetAtt ReconcileExecutionRole.Arn
      CodeSigningConfigArn: !Ref RepairCodeSigningConfig
      Code:
        S3Bucket: !Ref ReconcileArtifactBucket
        S3Key: !Ref ReconcileArtifactKey
        S3ObjectVersion: !Ref ReconcileArtifactVersion
      Environment:
        Variables:
          SOURCE_COMMIT: !Ref SourceCommit
          REPAIR_ID: !Ref RepairId
          PRINCIPAL_ID: !Ref PrincipalId
          IDENTITY_STORE_ID: !Ref IdentityStoreId
          IDENTITY_CENTER_INSTANCE_ARN: !Ref IdentityCenterInstanceArn
          COLLECTOR_PERMISSION_SET_ARN: !Ref CollectorPermissionSetArn
          REPAIR_INVOKER_PERMISSION_SET_ARN: !Ref RepairInvokerPermissionSetArn
          COLLECTOR_POLICY_DIGEST: !Ref CollectorPolicyDigest
          REPAIR_INVOKER_POLICY_DIGEST: !Ref RepairInvokerPolicyDigest
          ORIGINAL_GUG220_LEDGER_DIGEST: !Ref OriginalGug220LedgerDigest
          EXPECTED_PERMISSION_SET_TAGS_JSON: !Ref ExpectedPermissionSetTagsJson
          REPAIR_LEDGER_TABLE_NAME: !Ref RepairLedger
          REPAIR_LEDGER_KMS_KEY_ARN: !GetAtt RepairLedgerKey.Arn
          EXPECTED_ARTIFACT_CODE_SHA256: !Ref ReconcileArtifactCodeSha256
          EXPECTED_CODE_SIGNING_CONFIG_ARN: !Ref RepairCodeSigningConfig
          EXPECTED_SIGNING_PROFILE_VERSION_ARN: !Ref SigningProfileVersionArn
          REPAIR_NOT_BEFORE: !Ref RepairNotBefore
          REPAIR_NOT_AFTER: !Ref RepairNotAfter
          PLAN_FUNCTION_VERSION: !GetAtt PlanFunctionVersion.Version
          REPAIR_FUNCTION_VERSION: !GetAtt RepairFunctionVersion.Version
          COLLECTOR_SAML_PROVIDER_ARN: !Ref CollectorSamlProviderArn
          IDENTITY_CENTER_KMS_MODE: !Ref IdentityCenterKmsMode
          IDENTITY_CENTER_KMS_KEY_ARN: !Ref IdentityCenterKmsKeyArn
          EXPECTED_BOTO3_VERSION: !Ref ExpectedBoto3Version
          EXPECTED_BOTOCORE_VERSION: !Ref ExpectedBotocoreVersion
      Tags:
        - {Key: managed_by, Value: cloudformation}
        - {Key: service, Value: scanalyze-platform-authority}
        - {Key: source_commit, Value: !Ref SourceCommit}
        - {Key: work_package, Value: GUG-221}
        - {Key: environment, Value: non-production}
        - {Key: production, Value: 'false'}

  ReconcileFunctionVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName: !Ref ReconcileFunction
      CodeSha256: !Ref ReconcileArtifactCodeSha256
      Description: GUG-221 reviewed immutable reconcile version

  ReconcileAlias:
    Type: AWS::Lambda::Alias
    Properties:
      FunctionName: !Ref ReconcileFunction
      FunctionVersion: !GetAtt ReconcileFunctionVersion.Version
      Name: reconcile-v1

  ReconcileEventInvokeConfig:
    Type: AWS::Lambda::EventInvokeConfig
    DependsOn: ReconcileAlias
    Properties:
      FunctionName: !Ref ReconcileFunction
      Qualifier: reconcile-v1
      MaximumEventAgeInSeconds: 60
      MaximumRetryAttempts: 0

Outputs:
  RepairLedgerName:
    Value: !Ref RepairLedger
  RepairLedgerKeyArn:
    Value: !GetAtt RepairLedgerKey.Arn
  RepairFunctionAliasArn:
    Value: !Ref RepairAlias
  PlanFunctionAliasArn:
    Value: !Ref PlanAlias
  ReconcileFunctionAliasArn:
    Value: !Ref ReconcileAlias
  RepairExecutionRoleArn:
    Value: !GetAtt RepairExecutionRole.Arn
  PlanExecutionRoleArn:
    Value: !GetAtt PlanExecutionRole.Arn
  ReconcileExecutionRoleArn:
    Value: !GetAtt ReconcileExecutionRole.Arn
  InvocationAuthorityInspectorRoleArn:
    Value: !GetAtt InvocationAuthorityInspectorRole.Arn
  ProductionAuthorized:
    Value: 'false'
